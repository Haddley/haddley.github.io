<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Invaders Clone</title>
    <style>
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        canvas { border: 2px solid #ccc; image-rendering: pixelated; background-color: black; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- Load global dependencies first -->
     <script src="./src/audio.js"></script>
    <script src="./src/constants.js"></script>
    <script src="./src/input.js"></script>
    <script src="./src/sprites.js"></script>
    
    <!-- Core Logic & Entities (These are assumed to define globals when running as IIFEs) -->
    <script src="./src/entities/entity.js"></script>
    <script src="./src/entities/alien.js"></script>
    <script src="./src/entities/alienBullet.js"></script>
    <script src="./src/entities/bullet.js"></script>
    <script src="./src/entities/explosion.js"></script>
    <script src="./src/entities/player.js"></script>
    <script src="./src/entities/shield.js"></script>
    <script src="./src/entities/ufo.js"></script>

    <!-- Game Engine Initialization MUST happen last -->
    <script src="./src/engine.js"></script>
</body>
