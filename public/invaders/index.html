<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-overlay">
            <div id="score-board">
                <span>Score: <span id="score">0</span></span>
                <span id="hi-score-display">Hi: <span id="hi-score">0</span></span>
                <span>Wave: <span id="wave-count">1</span></span>
                <span id="lives-display">Lives: <span id="lives-count">3</span></span>
            </div>
            <div id="message-screen" class="hidden">
                <h1 id="message-text">GAME OVER</h1>
                <p id="final-score-text"></p>
                <button id="restart-btn">Restart Game</button>
            </div>
        </div>
    </div>

    <!-- Load scripts -->
    <script type="module" src="src/engine.js"></script>
</body>
</html>
