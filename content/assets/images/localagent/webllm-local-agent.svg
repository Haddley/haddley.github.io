<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#1a2b4b" />

  <!-- Brain / neural network nodes -->
  <!-- Left cluster -->
  <circle cx="32" cy="45" r="6" fill="#4fc3f7" opacity="0.9"/>
  <circle cx="28" cy="65" r="5" fill="#4fc3f7" opacity="0.75"/>
  <circle cx="38" cy="78" r="5.5" fill="#4fc3f7" opacity="0.8"/>

  <!-- Right cluster -->
  <circle cx="88" cy="45" r="6" fill="#4fc3f7" opacity="0.9"/>
  <circle cx="92" cy="65" r="5" fill="#4fc3f7" opacity="0.75"/>
  <circle cx="82" cy="78" r="5.5" fill="#4fc3f7" opacity="0.8"/>

  <!-- Center nodes -->
  <circle cx="60" cy="35" r="7" fill="#80deea" opacity="0.95"/>
  <circle cx="48" cy="58" r="6" fill="#80deea" opacity="0.85"/>
  <circle cx="72" cy="58" r="6" fill="#80deea" opacity="0.85"/>
  <circle cx="60" cy="80" r="7" fill="#80deea" opacity="0.95"/>

  <!-- Connections -->
  <line x1="32" y1="45" x2="60" y2="35" stroke="#4fc3f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="32" y1="45" x2="48" y2="58" stroke="#4fc3f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="28" y1="65" x2="48" y2="58" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="65" x2="38" y2="78" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <line x1="38" y1="78" x2="60" y2="80" stroke="#4fc3f7" stroke-width="1.2" opacity="0.5"/>

  <line x1="88" y1="45" x2="60" y2="35" stroke="#4fc3f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="88" y1="45" x2="72" y2="58" stroke="#4fc3f7" stroke-width="1.2" opacity="0.5"/>
  <line x1="92" y1="65" x2="72" y2="58" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <line x1="92" y1="65" x2="82" y2="78" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <line x1="82" y1="78" x2="60" y2="80" stroke="#4fc3f7" stroke-width="1.2" opacity="0.5"/>

  <line x1="60" y1="35" x2="48" y2="58" stroke="#80deea" stroke-width="1.4" opacity="0.6"/>
  <line x1="60" y1="35" x2="72" y2="58" stroke="#80deea" stroke-width="1.4" opacity="0.6"/>
  <line x1="48" y1="58" x2="60" y2="80" stroke="#80deea" stroke-width="1.4" opacity="0.6"/>
  <line x1="72" y1="58" x2="60" y2="80" stroke="#80deea" stroke-width="1.4" opacity="0.6"/>
  <line x1="48" y1="58" x2="72" y2="58" stroke="#80deea" stroke-width="1.4" opacity="0.55"/>

  <!-- Chat bubble indicator at bottom right -->
  <rect x="70" y="88" width="24" height="16" rx="4" fill="#ffffff" opacity="0.9"/>
  <polygon points="74,104 70,110 80,104" fill="#ffffff" opacity="0.9"/>
  <!-- Dots inside bubble -->
  <circle cx="77" cy="96" r="1.8" fill="#1a2b4b"/>
  <circle cx="82" cy="96" r="1.8" fill="#1a2b4b"/>
  <circle cx="87" cy="96" r="1.8" fill="#1a2b4b"/>
</svg>
